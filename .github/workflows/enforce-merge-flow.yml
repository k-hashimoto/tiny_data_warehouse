name: Enforce Merge Flow

on:
  pull_request:
    branches:
      - main

jobs:
  check-source-branch:
    name: Check source branch is staging
    runs-on: ubuntu-latest
    steps:
      - name: Fail if not from staging
        run: |
          echo "PR source branch: ${{ github.head_ref }}"
          if [ "${{ github.head_ref }}" != "staging" ]; then
            echo "Error: PRs to main must come from 'staging' branch."
            echo "Current source: ${{ github.head_ref }}"
            exit 1
          fi
          echo "OK: Source branch is 'staging'."
