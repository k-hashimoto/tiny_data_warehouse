# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  default:
    cmds:
      - task --list-all
    silent: true

  build:
    desc: Build App and install to /Applications
    cmds:
      - npm install && npm run tauri build -- --bundles app
      - cp -r "src-tauri/target/release/bundle/macos/Tiny Data Ware House.app" /Applications/

  clean:
    desc: Clean
    cmds:
      - rm -rf src-tauri/target/
      - rm -rf dist/
      - rm -rf node_modules/
