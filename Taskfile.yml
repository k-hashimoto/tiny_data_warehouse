# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  default:
    cmds:
      - task --list-all
    silent: true

  build:
    desc: Build App and install to /Applications
    cmds:
      - npm install && npm run tauri build -- --bundles app
      - cp -r "src-tauri/target/release/bundle/macos/TinyDataWarehouse.app" /Applications/

  release:prepare:
    desc: "Update tauri.conf.json and Cargo.toml to latest GitHub Release tag (run before build)"
    cmds:
      - ./scripts/release.sh --prepare

  release:upload:
    desc: Upload built app binary to GitHub Release
    cmds:
      - ./scripts/release.sh

  release:
    desc: "Full release flow: checkout main → pull → prepare versions → build → upload"
    cmds:
      - git checkout main
      - git pull
      - task: release:prepare
      - task: build
      - task: release:upload

  release:guide:
    desc: Show release workflow guide
    silent: true
    cmds:
      - |
        echo ""
        echo "=================================="
        echo "  Release Workflow Guide"
        echo "=================================="
        echo ""
        echo "  [Automatic - on staging→main merge]"
        echo "  1. Merge staging→main PR on GitHub"
        echo "     → create-release workflow auto-creates a GitHub Release"
        echo "        with incremented tag (0.1.x+1) and PR titles as notes"
        echo ""
        echo "  [Local - build & upload binary]"
        echo "  2. git pull"
        echo "  3. task release"
        echo "     (= release:prepare → build → release:upload)"
        echo ""
        echo "  Or step by step:"
        echo "  3a. task release:prepare   # update tauri.conf.json & Cargo.toml"
        echo "  3b. task build             # build with correct version"
        echo "  3c. task release:upload    # upload binary to GitHub Release"
        echo ""

  mcp_log:
    cmds:
      - tail -f  ~/.tdwh/logs/mcp_access.log

  clean:
    desc: Clean
    cmds:
      - rm -rf src-tauri/target/
      - rm -rf dist/
      - rm -rf node_modules/
